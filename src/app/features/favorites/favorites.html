<div class="favorites-container">
  <header class="favorites-header">
    <h1 class="favorites-title">Mis <span>Favoritos</span></h1>
    <p class="favorites-subtitle">Tus películas guardadas para ver más tarde</p>
  </header>

  @if (favorites.length > 0) {
    <div class="movies-grid">
      @for (movie of favorites; track movie.id) {
        <app-movie-card [movie]="movie"></app-movie-card>
      }
    </div>
  } @else {
    <div class="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </div>
      <h2>Tu lista está vacía</h2>
      <p>Aún no has guardado ninguna película. ¡Explora el catálogo y añade tus favoritas!</p>
      <button routerLink="/" class="explore-btn">Explorar Películas</button>
    </div>
  }
</div>
