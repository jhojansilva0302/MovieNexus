<div class="favorites-container">
  <header class="favorites-header">
    <h1 class="favorites-title">Mis <span>Favoritos</span></h1>
    <p class="favorites-subtitle">Tus películas guardadas para ver más tarde</p>
  </header>

  @if (favorites.length > 0) {
    <div class="movies-grid">
      @for (movie of favorites; track movie.id) {
        <app-movie-card [movie]="movie"></app-movie-card>
      }
    </div>
  } @else {
    <app-empty-state
      title="Tu lista está vacía"
      message="Aún no has guardado ninguna película. ¡Explora el catálogo y añade tus favoritas!"
      icon="heart"
      actionText="Explorar Películas"
      actionLink="/"
    ></app-empty-state>
  }
</div>
