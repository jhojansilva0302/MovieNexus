<div class="cast-card">
  <div class="profile-container">
    <img [src]="profileUrl" [alt]="actor.name" class="profile-image" loading="lazy">
  </div>
  <div class="actor-info">
    <h4 class="actor-name">{{ actor.name }}</h4>
    <p class="actor-character">{{ actor.character }}</p>
  </div>
</div>
