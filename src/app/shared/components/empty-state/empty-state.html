<div class="empty-state-container">
  <div class="empty-state-card">
    <div class="empty-state-icon-wrapper" [ngClass]="icon">
      @if (icon === 'heart') {
        <svg viewBox="0 0 24 24" class="empty-svg pulse-animation">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      } @else if (icon === 'alien') {
        <svg viewBox="0 0 64 64" class="empty-svg float-animation">
          <!-- UFO / Alien Spaceship -->
          <path fill="currentColor" d="M32 10C22 10 14 15 14 21c0 3.5 3.1 6.6 8.3 8.3C21.4 31 22 34 24 37c2 3 5 4.5 8 4.5s6-1.5 8-4.5c2-3 2.6-6 1.7-7.7C46.9 27.6 50 24.5 50 21c0-6-8-11-18-11zm0 4c7.2 0 13 3.1 13 7s-5.8 7-13 7-13-3.1-13-7 5.8-7 13-7zm0 23c-1.7 0-3.5-.8-4.8-2.2C26.5 34 26 32 26.5 30c1.7 1.2 3.5 1.8 5.5 1.8s3.8-.6 5.5-1.8c.5 2 0 4-.7 4.8-1.3 1.4-3.1 2.2-4.8 2.2z" />
          <ellipse cx="32" cy="21" rx="5" ry="3" fill="#ffffff" opacity="0.8"/>
          <!-- Lights -->
          <circle cx="20" cy="25" r="1.5" fill="#00e5ff" />
          <circle cx="32" cy="27" r="1.5" fill="#0055ff" />
          <circle cx="44" cy="25" r="1.5" fill="#00e5ff" />
          <!-- Beams -->
          <polygon points="26,46 38,46 48,60 16,60" fill="url(#beam-gradient)" opacity="0.3" />
          <defs>
            <linearGradient id="beam-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#00e5ff" stop-opacity="1" />
              <stop offset="100%" stop-color="#0055ff" stop-opacity="0" />
            </linearGradient>
          </defs>
        </svg>
      } @else if (icon === 'jungle') {
        <svg viewBox="0 0 64 64" class="empty-svg float-animation">
          <!-- Monstera / Tropical Leaves in background -->
          <path d="M12 45c0-12 10-20 20-20s20 8 20 20c0 4-4 8-8 8s-6-4-12-4-8 4-12 4-8-4-8-8z" fill="#10b981" opacity="0.3" />
          <!-- Vines / Leaves details -->
          <path d="M8 24c4-2 8 0 10 4s0 8-4 10-8 0-10-4 0-8 4-10z" fill="#047857" opacity="0.4" />
          <path d="M56 24c-4-2-8 0-10 4s0 8 4 10 8 0 10-4 0-8-4-10z" fill="#047857" opacity="0.4" />
          <!-- Compass Outer Ring -->
          <circle cx="32" cy="39" r="18" fill="#0d1020" stroke="#00e5ff" stroke-width="2.5" />
          <!-- Inner Dial -->
          <circle cx="32" cy="39" r="14" fill="#0a0c16" stroke="#0055ff" stroke-width="1.5" stroke-dasharray="4,2" />
          <!-- Compass Rose / Directions -->
          <text x="32" y="30" font-size="5" font-weight="900" fill="#00e5ff" text-anchor="middle">N</text>
          <text x="32" y="52" font-size="5" font-weight="900" fill="#00e5ff" text-anchor="middle">S</text>
          <text x="44" y="41" font-size="5" font-weight="900" fill="#00e5ff" text-anchor="middle">E</text>
          <text x="20" y="41" font-size="5" font-weight="900" fill="#00e5ff" text-anchor="middle">O</text>
          <!-- Needle (spinning wildly!) -->
          <polygon points="32,28 35,39 32,42" fill="#ef4444" class="compass-needle" />
          <polygon points="32,50 29,39 32,42" fill="#e2e8f0" class="compass-needle" />
          <!-- Center Pin -->
          <circle cx="32" cy="39" r="2.5" fill="#f59e0b" />
        </svg>
      } @else if (icon === 'search') {
        <svg viewBox="0 0 24 24" class="empty-svg pulse-animation">
          <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" class="empty-svg shake-animation">
          <path d="M21 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7l-2 3v1h8v-1l-2-3h7c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H3V4h18v12zm-9-9c-.55 0-1 .45-1 1v4c0 .55.45 1 1 1s1-.45 1-1V8c0-.55-.45-1-1-1zm0 8c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/>
        </svg>
      }
    </div>
    
    <h2 class="empty-title">{{ title }}</h2>
    <p class="empty-message">{{ message }}</p>
    
    @if (actionText && actionLink) {
      <button [routerLink]="actionLink" class="empty-action-btn">
        {{ actionText }}
      </button>
    }
  </div>
</div>
